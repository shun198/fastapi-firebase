services:
  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/code
    ports:
      - "8000:8000"
      # for debugging (VS Code launch.json)
      - "8080:8080"
    command: uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    env_file:
      - .env
  db:
    container_name: db
    image: postgres:17-alpine
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U "${POSTGRES_USER:-postgres}" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env
    ports:
      - '5432:5432' # for debugging

volumes:
  db_data: