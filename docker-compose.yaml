services:
  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/code
    ports:
      - "8000:8000"
      # デバッグ用（VS Code launch.json と揃える）
      - "8080:8080"
    command: uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    env_file:
      - .env
